# Sentiment Dashboard Configuration

scraping:
  reddit:
    max_posts: 50
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
  twitter:
    max_tweets: 50
  amazon:
    max_reviews: 50
  timeout: 30000 # Playwright timeout in ms

models:
  default_model: "BERT"
  bert: "distilbert-base-uncased-finetuned-sst-2-english"
  roberta: "cardiffnlp/twitter-roberta-base-sentiment"

database:
  db_path: "sentiment_dashboard.db"

preprocessing:
  remove_urls: true
  remove_mentions: true
  convert_emojis: true
